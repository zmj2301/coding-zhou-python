<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>视频库 - ZCLAW</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --secondary-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --error-gradient: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow-glow: 0 0 40px rgba(102, 126, 234, 0.3);
            --command-bg: rgba(0, 0, 0, 0.4);
            --command-border: rgba(79, 172, 254, 0.5);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.4);
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --border-radius-sm: 8px;
            --border-radius-md: 16px;
            --border-radius-lg: 24px;
            --border-radius-full: 50%;
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 背景网格效果 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(102, 126, 234, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102, 126, 234, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* 背景粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float-particle 20s infinite linear;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 背景曲线效果 */
        .curves-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.1;
        }

        .curve {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: curve-move 20s ease-in-out infinite;
        }

        .curve:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -100px;
            left: -100px;
            background: linear-gradient(135deg, #667eea, transparent);
            animation-delay: 0s;
        }

        .curve:nth-child(2) {
            width: 800px;
            height: 800px;
            bottom: -200px;
            right: -200px;
            background: linear-gradient(135deg, #f093fb, transparent);
            animation-delay: 5s;
        }

        .curve:nth-child(3) {
            width: 400px;
            height: 400px;
            top: 50%;
            right: 10%;
            background: linear-gradient(135deg, #4facfe, transparent);
            animation-delay: 10s;
        }

        @keyframes curve-move {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, 20px) scale(1.05); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: var(--spacing-lg);
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-md) 0;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: var(--spacing-xl);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo i {
            font-size: 2rem;
        }

        .nav-links {
            display: flex;
            gap: var(--spacing-lg);
            align-items: center;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color var(--transition-fast);
            font-weight: 500;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link.active {
            color: #a8b2ff;
        }

        /* 页面标题 */
        .page-title {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .page-title h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: var(--spacing-sm);
            background: linear-gradient(135deg, #fff 0%, #a8b2ff 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* 分类标签 */
        .category-tabs {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-tab {
            padding: var(--spacing-sm) var(--spacing-lg);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-md);
            background: var(--glass-bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-normal);
            backdrop-filter: blur(10px);
        }

        .category-tab:hover {
            border-color: rgba(102, 126, 234, 0.5);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .category-tab.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
        }

        /* 视频网格 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .video-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            transition: all var(--transition-normal);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .video-thumbnail {
            position: relative;
            height: 180px;
            overflow: hidden;
            cursor: pointer;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-normal);
        }

        .video-card:hover .video-thumbnail img {
            transform: scale(1.05);
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            opacity: 0;
            transition: all var(--transition-normal);
            cursor: pointer;
        }

        .video-card:hover .play-button {
            opacity: 1;
        }

        .play-button:hover {
            background: var(--primary-gradient);
            transform: translate(-50%, -50%) scale(1.1);
        }

        .video-info {
            padding: var(--spacing-md);
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
        }

        .video-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-md);
            line-height: 1.4;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .video-duration {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .video-category {
            padding: 2px 8px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: var(--border-radius-sm);
            font-size: 0.75rem;
        }

        /* 视频播放器模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            max-height: 80vh;
        }

        .video-player {
            width: 100%;
            height: auto;
            border-radius: var(--border-radius-md);
            overflow: hidden;
            background: black;
        }

        .video-player video {
            width: 100%;
            height: auto;
            display: block;
        }

        .modal-header {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: var(--spacing-sm);
        }

        .modal-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .modal-btn:hover {
            background: var(--primary-gradient);
            transform: scale(1.1);
        }

        /* 专注模式 */
        .focus-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .focus-mode.active {
            display: flex;
        }

        .focus-mode video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        .focus-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: var(--spacing-md);
            background: rgba(0, 0, 0, 0.7);
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: var(--border-radius-md);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: var(--spacing-md);
            opacity: 0.3;
        }

        .empty-state h3 {
            margin-bottom: var(--spacing-sm);
            color: var(--text-secondary);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: var(--spacing-md);
            }

            .page-title h1 {
                font-size: 2rem;
            }

            .video-grid {
                grid-template-columns: 1fr;
            }

            .nav-links {
                gap: var(--spacing-md);
            }

            .category-tabs {
                gap: var(--spacing-sm);
            }

            .category-tab {
                padding: var(--spacing-xs) var(--spacing-md);
                font-size: 0.9rem;
            }
        }
    </style>
</head>

        // DOM 元素
        const videoGrid = document.getElementById('video-grid');
        const categoryTabs = document.querySelectorAll('.category-tab');
        const videoModal = document.getElementById('video-modal');
        const videoPlayer = document.getElementById('video-player');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const focusModeBtn = document.getElementById('focus-mode-btn');
        const focusMode = document.getElementById('focus-mode');
        const focusVideo = document.getElementById('focus-video');
        const exitFocusBtn = document.getElementById('exit-focus-btn');

        // 渲染视频网格
        function renderVideos(filteredVideos) {
            videoGrid.innerHTML = '';
            
            if (filteredVideos.length === 0) {
                videoGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-video"></i>
                        <h3>暂无视频</h3>
                        <p>该分类下暂无视频内容</p>
                    </div>
                `;
                return;
            }

            filteredVideos.forEach(video => {
                const videoCard = document.createElement('div');
                videoCard.className = 'video-card';
                videoCard.innerHTML = `
                    <div class="video-thumbnail" data-video-id="${video.id}">
                        <img src="${video.thumbnail}" alt="${video.title}">
                        <div class="play-button" data-video-id="${video.id}">
                            <i class="fas fa-play"></i>
                        </div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                        <p class="video-description">${video.description}</p>
                        <div class="video-meta">
                            <div class="video-duration">
                                <i class="fas fa-clock"></i>
                                ${video.duration}
                            </div>
                            <div class="video-category">${getCategoryName(video.category)}</div>
                        </div>
                    </div>
                `;
                videoGrid.appendChild(videoCard);
            });

            // 添加点击事件
            document.querySelectorAll('.video-thumbnail, .play-button').forEach(element => {
                element.addEventListener('click', (e) => {
                    const videoId = parseInt(e.currentTarget.dataset.videoId);
                    playVideo(videoId);
                });
            });
        }

        // 获取分类名称
        function getCategoryName(category) {
            const categoryNames = {
                education: '教育',
                technology: '科技',
                entertainment: '娱乐',
                lifestyle: '生活'
            };
            return categoryNames[category] || category;
        }

        // 播放视频
        function playVideo(videoId) {
            const video = videos.find(v => v.id === videoId);
            if (video) {
                videoPlayer.querySelector('source').src = video.videoUrl;
                videoPlayer.load();
                videoPlayer.play();
                videoModal.classList.add('active');
            }
        }

        // 分类切换
        categoryTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // 更新活跃状态
                categoryTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                // 过滤视频
                const category = tab.dataset.category;
                let filteredVideos = videos;
                if (category !== 'all') {
                    filteredVideos = videos.filter(video => video.category === category);
                }
                
                // 渲染视频
                renderVideos(filteredVideos);
            });
        });

        // 关闭模态框
        closeModalBtn.addEventListener('click', () => {
            videoPlayer.pause();
            videoModal.classList.remove('active');
        });

        // 进入专注模式
        focusModeBtn.addEventListener('click', () => {
            const currentSrc = videoPlayer.querySelector('source').src;
            focusVideo.querySelector('source').src = currentSrc;
            focusVideo.load();
            focusVideo.play();
            // 禁止拖动进度条
            focusVideo.onseeking = function() {
                this.currentTime = this.currentTime;
            };
            videoModal.classList.remove('active');
            focusMode.classList.add('active');
        });

        // 退出专注模式
        exitFocusBtn.addEventListener('click', () => {
            focusVideo.pause();
            focusMode.classList.remove('active');
            // 恢复普通模式的进度条功能
            videoPlayer.onseeking = null;
        });

        // 点击模态框外部关闭
        videoModal.addEventListener('click', (e) => {
            if (e.target === videoModal) {
                videoPlayer.pause();
                videoModal.classList.remove('active');
            }
        });

        // 初始化渲染所有视频
        renderVideos(videos);
    </script>
</body>
</html>
