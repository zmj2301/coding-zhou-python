<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>飞机大战 - 网页版</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
  body { background: linear-gradient(180deg, #0a1929 0%, #132f4c 50%, #1e3a5f 100%); }
  #gameCanvas {
    background: linear-gradient(180deg, #0a1929 0%, #132f4c 100%);
    display: block;
    margin: 0 auto;
    border: 2px solid #2d5986;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(88, 166, 255, 0.3);
    touch-action: none;
    max-width: 100vw;
    max-height: 70vh;
  }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn-fire {
    padding: 14px 30px;
    background: linear-gradient(135deg, #f85149, #da3633);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    box-shadow: 0 4px 12px rgba(248, 81, 73, 0.4);
  }
  .btn-fire:active { transform: scale(0.95); }
  .hint {
    text-align: center;
    color: #8b949e;
    font-size: 13px;
    margin-top: 8px;
    padding: 0 16px;
  }
  @media (max-width: 600px) {
    .controls { gap: 8px; padding: 0 12px; }
    .btn-fire { padding: 12px 24px; font-size: 14px; }
  }
</style>
</head>
<body>
<div class="game-page">
  <div class="game-header">
    <button onclick="window.location.href='../index.html'">← 返回工具箱</button>
    <h1>✈️ 飞机大战</h1>
    <div class="score">分数: <span id="score">0</span></div>
  </div>
  <canvas id="gameCanvas" width="480" height="720"></canvas>
  <p class="hint">💡 电脑：鼠标移动控制飞机，点击或空格键射击 · 手机：手指滑动控制飞机，点击红色按钮射击</p>
  <div class="controls">
    <button class="btn-fire" id="btnFire">🔫 射击（按住连射）</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

let player = { x: 240, y: 620, w: 40, h: 40, speed: 6 };
let bullets = [];
let enemies = [];
let particles = [];
let score = 0;
let gameOver = false;
let lastEnemySpawn = 0;
let lastShot = 0;
let isFiring = false;
let mouseX = 240, mouseY = 620;

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;
});
canvas.addEventListener('mousedown', () => { isFiring = true; });
canvas.addEventListener('mouseup', () => { isFiring = false; });
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  isFiring = true;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  mouseX = (e.touches[0].clientX - rect.left) * scaleX;
  mouseY = (e.touches[0].clientY - rect.top) * scaleY;
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  mouseX = (e.touches[0].clientX - rect.left) * scaleX;
  mouseY = (e.touches[0].clientY - rect.top) * scaleY;
}, { passive: false });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); isFiring = false; }, { passive: false });

document.getElementById('btnFire').addEventListener('mousedown', () => isFiring = true);
document.getElementById('btnFire').addEventListener('mouseup', () => isFiring = false);
document.getElementById('btnFire').addEventListener('mouseleave', () => isFiring = false);
document.getElementById('btnFire').addEventListener('touchstart', (e) => { e.preventDefault(); isFiring = true; }, { passive: false });
document.getElementById('btnFire').addEventListener('touchend', (e) => { e.preventDefault(); isFiring = false; }, { passive: false });

document.addEventListener('keydown', (e) => { if (e.key === ' ') { e.preventDefault(); isFiring = true; } });
document.addEventListener('keyup', (e) => { if (e.key === ' ') isFiring = false; });

function spawnEnemy() {
  const size = 30 + Math.random() * 20;
  enemies.push({
    x: Math.random() * (canvas.width - size),
    y: -size,
    w: size,
    h: size,
    speed: 1.5 + Math.random() * 2.5 + score / 200,
    color: `hsl(${Math.random() * 60}, 70%, 55%)`
  });
}

function createParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      life: 30 + Math.random() * 20,
      color: `hsl(${Math.random() * 60 + 10}, 80%, 60%)`
    });
  }
}

function update(ts) {
  if (gameOver) return;
  player.x += (mouseX - player.x - player.w / 2) * 0.15;
  player.y += (mouseY - player.y - player.h / 2) * 0.15;
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

  if (isFiring && ts - lastShot > 120) {
    bullets.push({ x: player.x + player.w / 2 - 3, y: player.y, w: 6, h: 15, speed: 10 });
    lastShot = ts;
  }

  bullets.forEach(b => b.y -= b.speed);
  bullets = bullets.filter(b => b.y > -b.h);

  if (ts - lastEnemySpawn > Math.max(400, 900 - score / 5)) {
    spawnEnemy();
    lastEnemySpawn = ts;
  }

  enemies.forEach(e => e.y += e.speed);
  enemies = enemies.filter(e => e.y < canvas.height + 50);

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
        bullets.splice(j, 1);
        enemies.splice(i, 1);
        score += 10;
        scoreEl.textContent = score;
        createParticles(e.x + e.w / 2, e.y + e.h / 2, 10);
        break;
      }
    }
  }

  for (const e of enemies) {
    if (player.x < e.x + e.w && player.x + player.w > e.x &&
        player.y < e.y + e.h && player.y + player.h > e.y) {
      gameOver = true;
      createParticles(player.x + player.w / 2, player.y + player.h / 2, 30);
      setTimeout(() => {
        if (confirm(`💥 游戏结束！最终得分：${score}\n再来一局？`)) location.reload();
      }, 500);
      break;
    }
  }

  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0a1929';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  const starSeed = Math.floor(Date.now() / 1000) % 100;
  for (let i = 0; i < 50; i++) {
    const sx = ((i * 73 + starSeed * 13) % canvas.width);
    const sy = ((i * 97 + starSeed * 41) % canvas.height);
    ctx.fillRect(sx, sy, 2, 2);
  }

  // enemies (asteroids)
  enemies.forEach(e => {
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // bullets
  bullets.forEach(b => {
    ctx.fillStyle = '#f0f6fc';
    ctx.shadowColor = '#58a6ff';
    ctx.shadowBlur = 10;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
  });

  // player (plane)
  ctx.save();
  ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
  ctx.fillStyle = '#58a6ff';
  ctx.beginPath();
  ctx.moveTo(0, -player.h / 2);
  ctx.lineTo(-player.w / 2, player.h / 2);
  ctx.lineTo(0, player.h / 3);
  ctx.lineTo(player.w / 2, player.h / 2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#1f6feb';
  ctx.beginPath();
  ctx.arc(0, 0, 8, 0, Math.PI * 2);
  ctx.fill();
  // exhaust flame
  ctx.fillStyle = '#f85149';
  ctx.beginPath();
  ctx.moveTo(-8, player.h / 2);
  ctx.lineTo(0, player.h / 2 + 10 + Math.random() * 5);
  ctx.lineTo(8, player.h / 2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 4, 4);
  });
  ctx.globalAlpha = 1;
}

function loop(ts) {
  update(ts);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
