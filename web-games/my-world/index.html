<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的世界 - 2D方块建造</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
  .tool-card {
    width: 70px;
    height: 80px;
    background: #21262d;
    border: 2px solid #30363d;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    padding: 6px;
    gap: 4px;
  }
  .tool-card:hover { border-color: #58a6ff; transform: translateY(-2px); }
  .tool-card.selected { border-color: #58a6ff; background: rgba(88,166,255,0.15); }
  .tool-icon { width: 40px; height: 40px; border-radius: 4px; }
  .tool-name { font-size: 11px; color: #c9d1d9; }
</style>
</head>
<body>

<div class="game-header">
  <h1>🧱 我的世界 2D</h1>
  <p class="subtitle">左键放置方块 · 右键挖掘 · 数字键1-7切换材料</p>
</div>

<div class="game-container" id="gameContainer">
  <div class="game-stats">
    <div class="stat-item"><span class="label">模式</span><span class="value" id="mode">建造</span></div>
    <div class="stat-item"><span class="label">方块数</span><span class="value purple" id="blockCount">0</span></div>
    <div class="stat-item"><span class="label">材料</span><span class="value yellow" id="materialName">草地</span></div>
  </div>

  <div class="card-row" id="toolbar"></div>

  <canvas id="game" width="800" height="500"></canvas>

  <div class="controls">
    <button class="btn" id="clearBtn">清空世界</button>
    <button class="btn secondary" id="genBtn">生成地形</button>
    <button class="btn secondary" id="modeBtn">切换模式</button>
    <button class="btn secondary" onclick="location.href='../index.html'">返回</button>
  </div>
  <div class="game-info">
    <kbd>←</kbd><kbd>→</kbd> 移动视角 · <kbd>鼠标左键</kbd> 放置 · <kbd>鼠标右键</kbd> 挖掘 · <kbd>1-7</kbd> 选择方块 · <kbd>滚轮</kbd> 缩放
  </div>
</div>

<script>
const TILE = 32;
const GRID_W = 60;
const GRID_H = 30;

const MATERIALS = [
  { name: '草地', color1: '#7ec850', color2: '#5aa535', color3: '#4a8a28' },
  { name: '泥土', color1: '#8b5a2b', color2: '#6b4420', color3: '#4a2e18' },
  { name: '石头', color1: '#8a8a8a', color2: '#6a6a6a', color3: '#4a4a4a' },
  { name: '木头', color1: '#a0522d', color2: '#7a3e1e', color3: '#5a2e14' },
  { name: '沙子', color1: '#f4d47c', color2: '#d4b45a', color3: '#a49038' },
  { name: '水', color1: '#4a90d9', color2: '#3a70b0', color3: '#2a5080', water: true },
  { name: '钻石块', color1: '#5fd3d3', color2: '#3fb3b3', color3: '#1f9393', gem: true },
];

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let grid = [];
for (let x = 0; x < GRID_W; x++) {
  grid.push([]);
  for (let y = 0; y < GRID_H; y++) grid[x].push(-1);
}

// Generate initial terrain with rolling hills
function generateTerrain() {
  // Sky already -1
  const groundY = Math.floor(GRID_H * 0.6);
  for (let x = 0; x < GRID_W; x++) {
    const h = Math.floor(Math.sin(x * 0.15) * 2 + Math.sin(x * 0.4) * 1.5 + Math.random() * 1.5);
    const surface = groundY + h;
    for (let y = surface; y < GRID_H; y++) {
      if (y === surface) grid[x][y] = 0; // grass
      else if (y < surface + 3) grid[x][y] = 1; // dirt
      else grid[x][y] = 2; // stone
    }
    // Occasional trees
    if (Math.random() < 0.08 && surface > 5) {
      grid[x][surface - 1] = 3; // wood
      grid[x][surface - 2] = 3;
      if (x > 0) grid[x - 1][surface - 2] = 0; // leaves (grass-ish)
      if (x < GRID_W - 1) grid[x + 1][surface - 2] = 0;
    }
    // Occasional diamond ore deep
    if (surface + 5 < GRID_H && Math.random() < 0.05) {
      grid[x][surface + 5 + Math.floor(Math.random() * 3)] = 6;
    }
  }
  // Water basin
  for (let x = 10; x < 18; x++) {
    let y = groundY;
    while (y < GRID_H && grid[x][y] !== -1) {
      if (y < groundY + 2) grid[x][y] = 5;
      y++;
    }
    for (y = groundY; y < groundY + 2; y++) {
      if (grid[x][y] === 0 || grid[x][y] === 1) grid[x][y] = 5;
    }
  }
  countBlocks();
}

function countBlocks() {
  let n = 0;
  for (let x = 0; x < GRID_W; x++) for (let y = 0; y < GRID_H; y++) if (grid[x][y] >= 0) n++;
  document.getElementById('blockCount').textContent = n;
}

// View
let viewX = 0;
let mode = 'build'; // build / dig
let currentMat = 0;

// Build toolbar
const toolbar = document.getElementById('toolbar');
MATERIALS.forEach((m, i) => {
  const t = document.createElement('div');
  t.className = 'tool-card' + (i === currentMat ? ' selected' : '');
  t.innerHTML = `
    <div class="tool-icon" style="background: linear-gradient(135deg, ${m.color1}, ${m.color2}); border: 2px solid ${m.color3};"></div>
    <div class="tool-name">${i + 1}. ${m.name}</div>
  `;
  t.onclick = () => { currentMat = i; updateToolbar(); };
  toolbar.appendChild(t);
});

function updateToolbar() {
  [...toolbar.children].forEach((c, i) => c.classList.toggle('selected', i === currentMat));
  document.getElementById('materialName').textContent = MATERIALS[currentMat].name;
}

// Render
let animTime = 0;
function render() {
  animTime += 0.03;
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#87ceeb');
  grad.addColorStop(0.7, '#b7d9ef');
  grad.addColorStop(1, '#e8f4fa');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 200 + animTime * 10) % (canvas.width + 200)) - 100;
    const cy = 30 + (i % 2) * 40;
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.arc(cx + 20, cy + 4, 22, 0, Math.PI * 2);
    ctx.arc(cx + 40, cy, 16, 0, Math.PI * 2);
    ctx.fill();
  }
  // Sun
  ctx.fillStyle = '#ffe066';
  ctx.beginPath();
  ctx.arc(canvas.width - 80, 60, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255, 224, 102, 0.3)';
  ctx.beginPath();
  ctx.arc(canvas.width - 80, 60, 45, 0, Math.PI * 2);
  ctx.fill();

  // Blocks
  const startCol = Math.max(0, Math.floor(viewX / TILE));
  const endCol = Math.min(GRID_W, startCol + Math.ceil(canvas.width / TILE) + 1);
  for (let x = startCol; x < endCol; x++) {
    for (let y = 0; y < GRID_H; y++) {
      const m = grid[x][y];
      if (m < 0) continue;
      const mat = MATERIALS[m];
      const px = x * TILE - viewX;
      const py = y * TILE;
      if (mat.water) {
        ctx.fillStyle = mat.color1;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.strokeStyle = mat.color2;
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
          const wy = py + 6 + i * 9 + Math.sin(animTime * 2 + x * 0.5 + i) * 2;
          ctx.beginPath();
          ctx.moveTo(px + 2, wy);
          ctx.lineTo(px + TILE - 2, wy);
          ctx.stroke();
        }
      } else if (mat.gem) {
        ctx.fillStyle = mat.color2;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = mat.color1;
        ctx.fillRect(px + 4, py + 4, TILE - 8, TILE - 8);
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.5 + 0.3 * Math.sin(animTime * 3);
        ctx.fillRect(px + 8, py + 8, 8, 8);
        ctx.globalAlpha = 1;
      } else {
        // Base
        ctx.fillStyle = mat.color1;
        ctx.fillRect(px, py, TILE, TILE);
        // Edge
        ctx.fillStyle = mat.color3;
        ctx.fillRect(px, py + TILE - 4, TILE, 4);
        ctx.fillRect(px + TILE - 4, py, 4, TILE);
        // Texture dots
        ctx.fillStyle = mat.color2;
        const seed = x * 73 + y * 131;
        for (let i = 0; i < 3; i++) {
          const dx = (seed * (i + 1) * 17) % (TILE - 8) + 4;
          const dy = (seed * (i + 2) * 23) % (TILE - 8) + 4;
          ctx.fillRect(px + dx, py + dy, 3, 3);
        }
      }
    }
  }

  // Hover highlight
  if (mouseTile) {
    const px = mouseTile.x * TILE - viewX;
    const py = mouseTile.y * TILE;
    ctx.strokeStyle = mode === 'build' ? 'rgba(88,166,255,0.8)' : 'rgba(248,81,73,0.8)';
    ctx.lineWidth = 2;
    ctx.strokeRect(px, py, TILE, TILE);
    if (mode === 'build') {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = MATERIALS[currentMat].color1;
      ctx.fillRect(px, py, TILE, TILE);
      ctx.globalAlpha = 1;
    }
  }

  // Player character (simple)
  const playerScreenX = playerX * TILE - viewX;
  ctx.fillStyle = '#2196f3';
  ctx.fillRect(playerScreenX + 8, playerY * TILE + 4, TILE - 16, TILE - 4);
  ctx.fillStyle = '#ffcc80';
  ctx.fillRect(playerScreenX + 10, playerY * TILE, TILE - 20, 12);
  ctx.fillStyle = '#000';
  ctx.fillRect(playerScreenX + 13, playerY * TILE + 4, 2, 2);
  ctx.fillRect(playerScreenX + TILE - 15, playerY * TILE + 4, 2, 2);

  requestAnimationFrame(render);
}

// Input
let mouseTile = null;
let playerX = 10;
let playerY = 15;
let isLeftDown = false;
let isRightDown = false;

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const cy = (e.clientY - rect.top) * (canvas.height / rect.height);
  const tx = Math.floor((cx + viewX) / TILE);
  const ty = Math.floor(cy / TILE);
  mouseTile = (tx >= 0 && tx < GRID_W && ty >= 0 && ty < GRID_H) ? { x: tx, y: ty } : null;
});

canvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  if (!mouseTile) return;
  if (e.button === 0) { place(mouseTile.x, mouseTile.y); isLeftDown = true; }
  else if (e.button === 2) { dig(mouseTile.x, mouseTile.y); isRightDown = true; }
});
canvas.addEventListener('mouseup', () => { isLeftDown = false; isRightDown = false; });
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Continuous action while holding
setInterval(() => {
  if (!mouseTile) return;
  if (isLeftDown) place(mouseTile.x, mouseTile.y);
  if (isRightDown) dig(mouseTile.x, mouseTile.y);
}, 100);

function place(x, y) {
  if (grid[x][y] === -1) { grid[x][y] = currentMat; countBlocks(); }
}
function dig(x, y) {
  if (grid[x][y] !== -1) { grid[x][y] = -1; countBlocks(); }
}

// Keyboard
document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'arrowleft' || k === 'a') { viewX -= TILE * 2; playerX = Math.max(2, playerX - 1); }
  if (k === 'arrowright' || k === 'd') { viewX += TILE * 2; playerX = Math.min(GRID_W - 3, playerX + 1); }
  if (k === 'arrowup' || k === 'w') playerY = Math.max(1, playerY - 1);
  if (k === 'arrowdown' || k === 's') playerY = Math.min(GRID_H - 2, playerY + 1);
  if (k >= '1' && k <= '7') { currentMat = parseInt(k) - 1; updateToolbar(); }
  viewX = Math.max(0, Math.min(GRID_W * TILE - canvas.width, viewX));
});

// Buttons
document.getElementById('clearBtn').onclick = () => {
  for (let x = 0; x < GRID_W; x++) for (let y = 0; y < GRID_H; y++) grid[x][y] = -1;
  countBlocks();
};
document.getElementById('genBtn').onclick = () => { generateTerrain(); };
document.getElementById('modeBtn').onclick = () => {
  mode = mode === 'build' ? 'dig' : 'build';
  document.getElementById('mode').textContent = mode === 'build' ? '建造' : '挖掘';
  document.getElementById('modeBtn').textContent = mode === 'build' ? '切换模式' : '建造模式';
};

generateTerrain();
render();
</script>
</body>
</html>
