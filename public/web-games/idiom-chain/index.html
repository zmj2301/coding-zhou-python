<html lang="zh-CN">

<meta charset="UTF-8">

<title>成语接龙 - Idiom Chain</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
  .idiom-box {
    display: inline-block;
    padding: 10px 18px;
    margin: 6px;
    border-radius: 8px;
    font-size: 18px;
    font-weight: 600;
    animation: fadeIn 0.4s ease;
  }
  .idiom-user { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid #1f6feb; }
  .idiom-ai { background: rgba(163,113,247,0.15); color: #a371f7; border: 1px solid #8957e5; }
  .idiom-hint { background: rgba(210,153,34,0.15); color: #d29922; border: 1px solid #9e6a03; font-size: 13px; font-weight: normal; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .chain-area {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    min-height: 200px;
    max-height: 320px;
    overflow-y: auto;
    text-align: center;
  }
  .message {
    text-align: center;
    padding: 8px;
    font-size: 14px;
    color: #8b949e;
  }
  .message.success { color: #3fb950; }
  .message.error { color: #f85149; }
  .message.info { color: #58a6ff; }
</style>
</head>
<body>

<div class="game-header">
  <h1>📖 成语接龙</h1>
  <p class="subtitle">输入成语，第一个字需与上一个成语的最后一字相同</p>
</div>

<div class="game-container" id="gameContainer">
  <div class="game-stats">
    <div class="stat-item"><span class="label">回合</span><span class="value" id="round">0</span></div>
    <div class="stat-item"><span class="label">成功</span><span class="value green" id="success">0</span></div>
    <div class="stat-item"><span class="label">用时</span><span class="value yellow" id="timer">0s</span></div>
    <div class="stat-item"><span class="label">最高分</span><span class="value purple" id="best">0</span></div>
  </div>

  <div class="message info" id="message">点击开始游戏，AI将先出一个成语</div>
  <div class="chain-area" id="chainArea"><div class="idiom-box idiom-hint">成语接龙规则：下一个成语的首字 = 上一个成语的末字（可以是同音字）</div></div>

  <div style="display: flex; gap: 12px; align-items: center; justify-content: center; margin: 16px 0;">
    <div id="requireLabel" style="font-size: 18px; color: #f0f6fc; font-weight: 600;"></div>
  </div>

  <div style="display: flex; gap: 8px; justify-content: center; align-items: center;">
    <input type="text" id="answer" class="input-box" style="width: 220px; font-size: 18px;" placeholder="输入成语">
    <button class="btn" id="submitBtn">提交 (Enter)</button>
  </div>

  <div class="controls">
    <button class="btn secondary" id="startBtn">开始/重来</button>
    <button class="btn secondary" id="hintBtn">提示</button>
    <button class="btn secondary" id="skipBtn">跳过</button>
    <button class="btn secondary" onclick="location.href='../index.html'">返回</button>
  </div>
  <div class="game-info">
    <kbd>Enter</kbd> 提交 · 支持同音不同字的接龙 · 输入 <kbd>?</kbd> 请求提示 · 输入 <kbd>!</kbd> 跳过该轮
  </div>
</div>

  '海':'嗨亥','嗨':'海亥',
  '空':'恐控孔','孔':'空恐控',
  '前':'钱乾潜','钱':'前乾潜',
  '千':'迁签仟谦','迁':'千签仟谦',
  '金':'今斤巾筋津','今':'金斤巾筋津',
  '发':'法罚伐乏','法':'发罚伐乏',
  '神':'伸身深申','伸':'神身深申','身':'神伸深申',
  '鬼':'诡贵轨桂','诡':'鬼贵轨桂',
  '风':'丰封枫峰锋蜂逢','丰':'风封枫峰锋蜂逢',
  '雨':'语宇羽禹','语':'雨宇羽禹',
  '火':'伙货或获祸','伙':'火货或获祸',
  '水':'税睡虽','税':'水睡虽',
  '山':'删姗扇衫','删':'山姗扇衫',
  '石':'时十拾识实食','时':'石十拾识实食','十':'石时拾识实食',
  '木':'目牧幕墓睦','目':'木牧幕墓睦',
  '土':'吐兔途涂图','吐':'土兔途涂图',
  '口':'叩扣寇','叩':'口扣寇',
  '目':'木牧幕墓睦','牧':'木目幕墓睦',
  '耳':'尔迩饵','尔':'耳迩饵',
  '鼻':'比彼笔','比':'鼻彼笔',
  '手':'守首寿受','守':'手首寿受',
  '足':'族卒逐','族':'足卒逐',
  '心':'新薪馨辛',
  '肝':'干甘杆竿','干':'肝甘杆竿',
  '胆':'但担弹淡旦','但':'胆担弹淡旦',
  '眉':'煤梅媒枚','煤':'眉梅媒枚',
  '眼':'演烟言严颜','演':'眼烟言严颜',
  '身':'神伸深申',
  '面':'绵棉眠免','绵':'面棉眠免',
  '头':'投骰透',
  '发':'法罚伐乏',
};

function isMatch(prevLast, nextFirst) {
  if (prevLast === nextFirst) return true;
  const h = HOMOPHONES[prevLast];
  return h && h.includes(nextFirst);
}

function findIdiomStarting(ch, used) {
  const direct = BY_FIRST[ch];
  if (direct) {
    const candidates = direct.filter(x => !used.has(x));
    if (candidates.length > 0) return candidates[Math.floor(Math.random() * candidates.length)];
  }
  // try homophone
  const h = HOMOPHONES[ch];
  if (h) {
    for (const alt of h) {
      const list = BY_FIRST[alt];
      if (!list) continue;
      const candidates = list.filter(x => !used.has(x));
      if (candidates.length > 0) return candidates[Math.floor(Math.random() * candidates.length)];
    }
  }
  return null;
}

// Game state
let chain = [];
let used = new Set();
let currentLast = '';
let turn = 'ai';
let running = false;
let roundCount = 0;
let successCount = 0;
let startTime = 0;
let timerInterval = null;

function setMessage(text, cls) {
  const m = document.getElementById('message');
  m.textContent = text;
  m.className = 'message ' + (cls || 'info');
}

function addIdiomToChain(text, who) {
  const area = document.getElementById('chainArea');
  const box = document.createElement('div');
  box.className = 'idiom-box ' + (who === 'user' ? 'idiom-user' : 'idiom-ai');
  box.textContent = text + (who === 'user' ? ' ✓' : ' 🤖');
  area.appendChild(box);
  area.scrollTop = area.scrollHeight;
}

function startGame() {
  chain = [];
  used = new Set();
  roundCount = 0;
  successCount = 0;
  running = true;
  startTime = Date.now();
  document.getElementById('chainArea').innerHTML = '';
  turn = 'ai';
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (running) {
      const t = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timer').textContent = t + 's';
    }
  }, 500);
  aiTurn();
  updateUI();
}

function updateUI() {
  document.getElementById('round').textContent = roundCount;
  document.getElementById('success').textContent = successCount;
  if (currentLast) {
    document.getElementById('requireLabel').textContent = `请输入以「${currentLast}」开头的成语`;
  } else {
    document.getElementById('requireLabel').textContent = '';
  }
  const best = parseInt(localStorage.getItem('idiom_best') || '0');
  document.getElementById('best').textContent = best;
}

function aiTurn() {
  roundCount++;
  let aiPicked;
  if (chain.length === 0) {
    aiPicked = UNIQUE_IDIOMS[Math.floor(Math.random() * UNIQUE_IDIOMS.length)];
  } else {
    aiPicked = findIdiomStarting(currentLast, used);
  }
  if (!aiPicked) {
    setMessage('AI接不上了！你赢了！🎉', 'success');
    endGame(true);
    return;
  }
  chain.push(aiPicked);
  used.add(aiPicked);
  currentLast = aiPicked[aiPicked.length - 1];
  addIdiomToChain(aiPicked, 'ai');
  setMessage(`AI出：${aiPicked} → 请以「${currentLast}」开头`, 'info');
  turn = 'user';
  document.getElementById('answer').focus();
  updateUI();
}

function userSubmit() {
  if (!running) return;
  if (turn !== 'user') {
    setMessage('请等待AI出成语...', 'info');
    return;
  }
  const input = document.getElementById('answer').value.trim();
  document.getElementById('answer').value = '';

  if (input === '?' || input === '？') { return giveHint(); }
  if (input === '!' || input === '！') { return userSkip(); }

  if (input.length !== 4) {
    setMessage('请输入 4 个字的成语', 'error');
    return;
  }
  // Check first char matches
  if (!isMatch(currentLast, input[0])) {
    setMessage(`首字「${input[0]}」不匹配，需要「${currentLast}」开头（或同音）`, 'error');
    return;
  }
  // Check in dictionary
  if (!UNIQUE_IDIOMS.includes(input)) {
    setMessage(`「${input}」不是一个有效的成语`, 'error');
    return;
  }
  if (used.has(input)) {
    setMessage(`「${input}」已使用过，请换一个`, 'error');
    return;
  }
  chain.push(input);
  used.add(input);
  currentLast = input[input.length - 1];
  successCount++;
  addIdiomToChain(input, 'user');
  setMessage(`好！「${input}」→ 请以「${currentLast}」开头`, 'success');
  turn = 'ai';
  updateUI();
  setTimeout(aiTurn, 600);
}

function giveHint() {
  const hint = findIdiomStarting(currentLast, used);
  if (hint) {
    setMessage(`提示：试试「${hint[0]}${hint[1]}…」`, 'info');
  } else {
    setMessage('暂无可提示成语，请跳过此轮', 'error');
  }
}

function userSkip() {
  // Reset: find a new starting idiom for user
  setMessage('你跳过了这轮，AI重新开局', 'info');
  turn = 'ai';
  currentLast = '';
  chain = [];
  used = new Set();
  document.getElementById('chainArea').innerHTML = '';
  setTimeout(aiTurn, 500);
}

function endGame(userWon) {
  running = false;
  if (timerInterval) clearInterval(timerInterval);
  const best = parseInt(localStorage.getItem('idiom_best') || '0');
  if (successCount > best) {
    localStorage.setItem('idiom_best', String(successCount));
  }
  updateUI();
}

document.getElementById('startBtn').onclick = startGame;
document.getElementById('submitBtn').onclick = userSubmit;
document.getElementById('hintBtn').onclick = giveHint;
document.getElementById('skipBtn').onclick = userSkip;
document.getElementById('answer').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') userSubmit();
});

// Show initial state
updateUI();
</script>
